name: Add Commit For An Issue

on:
    issues:
        types: [opened]

jobs:
    add-default-message:
        runs-on: ubuntu-latest
        steps:
            - name: Add default message
              run: |
                curl -L \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{github.token}}" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                https://api.github.com/repos/${{ github.repository.full_name }}/issues/${{ github.repository.open_issues }}/comments \
                -d '{"body":"Me too"}'
